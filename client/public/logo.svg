<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="flameGrad1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#FF4D4D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flameGrad2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFB347;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer flame left -->
  <path d="M55 170 Q40 130 50 100 Q55 80 65 70 Q50 90 55 120 Q58 140 65 160 Z" fill="url(#flameGrad2)" opacity="0.8" filter="url(#glow)"/>

  <!-- Outer flame right -->
  <path d="M145 170 Q160 130 150 100 Q145 80 135 70 Q150 90 145 120 Q142 140 135 160 Z" fill="url(#flameGrad2)" opacity="0.8" filter="url(#glow)"/>

  <!-- Main flame center -->
  <path d="M100 30 Q85 60 80 90 Q75 110 70 130 Q65 150 70 170 Q80 185 100 190 Q120 185 130 170 Q135 150 130 130 Q125 110 120 90 Q115 60 100 30 Z" fill="url(#flameGrad1)" filter="url(#glow)"/>

  <!-- Inner flame -->
  <path d="M100 60 Q92 80 88 100 Q84 120 82 140 Q80 155 85 168 Q92 178 100 180 Q108 178 115 168 Q120 155 118 140 Q116 120 112 100 Q108 80 100 60 Z" fill="url(#flameGrad2)" opacity="0.9"/>

  <!-- Spatula handle -->
  <rect x="92" y="105" width="16" height="55" rx="4" fill="white" stroke="#1A1A1A" stroke-width="3"/>

  <!-- Spatula head -->
  <rect x="82" y="75" width="36" height="35" rx="6" fill="white" stroke="#1A1A1A" stroke-width="3"/>

  <!-- Spatula slots -->
  <rect x="90" y="82" width="4" height="20" rx="2" fill="#1A1A1A"/>
  <rect x="98" y="82" width="4" height="20" rx="2" fill="#1A1A1A"/>
  <rect x="106" y="82" width="4" height="20" rx="2" fill="#1A1A1A"/>

  <!-- Hand grip -->
  <path d="M88 150 Q85 155 85 162 Q85 170 92 174 L108 174 Q115 170 115 162 Q115 155 112 150 Z" fill="white" stroke="#1A1A1A" stroke-width="3"/>
  <line x1="92" y1="158" x2="108" y2="158" stroke="#1A1A1A" stroke-width="2"/>
  <line x1="92" y1="164" x2="108" y2="164" stroke="#1A1A1A" stroke-width="2"/>
</svg>
